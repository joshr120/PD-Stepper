# This example uses a custom TMC2209 component to control the PD Stepper
# It uses the encoder to get the current blind position so it will not lose home if blind is manually moved

# If the motor stalls it stops the motor and sets this as the new home/OPEN position (configurable)

# The "Home" button tries to move the blind up 120% of the set length and once a stall is detected it set this as the new home position (you may need to tune the stall theshold for you setup)
# This can be enabled at boot by setting home_on_boot to "true" in the substitutions block.


###################################
#########    SETTINGS   ###########
###################################
substitutions:
  #main settings you may want to change for your setup:
  device_name: "pd-stepper-blinds"     # ESPHome device name
  blinds_length: "30000"               # full blinds length (in encoder counts, 2048 per rev) !! CHANGE TO SUIT YOUR SETUP !! (make it negative to move in opposite direction!)
  encoder_invert: "true"               # set to "true" to invert the encoder direction mapping (may be different for some motors)
  stall_threshold: "20"                # higher = more sensitive, lower if stall triggering too often, 
  run_current: "800m"                  # motor current (800m = 800mA, 1 = 1A etc.) (current is set here, potentiometer is ignored)
  max_speed: "800"                     # steps/s
  acceleration: "1500"                 # steps/s²
  deceleration: "1500"                 # steps/s²
  pd_voltage: "15V"                    # PD voltage: 5V | 9V | 12V | 15V | 20V

  #additonal settings for different behaviours: (set all 3 to false to disable sensotless homing alltogether)
  home_on_boot: "false"                # set to "true" to automatically move and home the blind on boot
  stall_resets_home: "true"            # set to "false" to disable stall homing behaviour (motor will still stop on stall)
  stall_stops_motor: "true"            # set to "false" to disable motor stop on stall
  


external_components:
  - source: github://slimcdk/esphome-custom-components
    components: [tmc2209_hub, tmc2209, stepper]

globals:
  - id: encoder_tracking_
    type: int32_t[2]
    restore_value: no

  - id: encoder_offset_
    type: int32_t
    restore_value: no

  - id: sensored_home_pos
    type: int32_t
    restore_value: no
    initial_value: "0"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:

ota:
  - platform: esphome

logger:

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

esphome:
  name: ${device_name}
  platformio_options:
    board_build.flash_mode: dio
    upload_speed: 921600
  on_boot:
    - tmc2209.configure:
        microsteps: 4
        interpolation: true
        tcool_threshold: 400
    - tmc2209.stallguard:
        threshold: ${stall_threshold}
    - tmc2209.currents:
        ihold: 0
        tpowerdown: 0
        iholddelay: 0
        # irun: 16
        run_current: ${run_current}
        standstill_mode: freewheeling

    #set PD voltage: 5V=OFF/ON/OFF  9V=OFF/OFF/OFF  12V=OFF/OFF/ON  15V=OFF/ON/ON  20V=OFF/ON/OFF
    - if:
        condition:
          lambda: return std::string("${pd_voltage}") == "5V";
        then:
          - output.turn_off: { id: CFG1_pin }
          - output.turn_on:  { id: CFG2_pin }
          - output.turn_off: { id: CFG3_pin }
    - if:
        condition:
          lambda: return std::string("${pd_voltage}") == "9V";
        then:
          - output.turn_off: { id: CFG1_pin }
          - output.turn_off: { id: CFG2_pin }
          - output.turn_off: { id: CFG3_pin }
    - if:
        condition:
          lambda: return std::string("${pd_voltage}") == "12V";
        then:
          - output.turn_off: { id: CFG1_pin }
          - output.turn_off: { id: CFG2_pin }
          - output.turn_on:  { id: CFG3_pin }
    - if:
        condition:
          lambda: return std::string("${pd_voltage}") == "15V";
        then:
          - output.turn_off: { id: CFG1_pin }
          - output.turn_on:  { id: CFG2_pin }
          - output.turn_on:  { id: CFG3_pin }
    - if:
        condition:
          lambda: return std::string("${pd_voltage}") == "20V";
        then:
          - output.turn_off: { id: CFG1_pin }
          - output.turn_on:  { id: CFG2_pin }
          - output.turn_off: { id: CFG3_pin }

    - delay: 0.5s
    - lambda: id(sensored_home_pos) = id(encoder)->get_state();  # Set the home (open) position to power on position
    - if:
        condition:
          lambda: return ${home_on_boot};
        then:
          - button.press: home

i2c:
  sda: 8
  scl: 9
  scan: true

uart:
  tx_pin: 17
  rx_pin: 18
  baud_rate: 712000

output:
  - platform: ledc
    pin: 10
    id: led1_output

  - platform: ledc
    pin: 12
    id: led2_output

  - platform: gpio
    pin: GPIO38
    id: CFG1_pin
  - platform: gpio
    pin: GPIO48
    id: CFG2_pin
  - platform: gpio
    pin: GPIO47
    id: CFG3_pin

light:
  - platform: monochromatic
    output: led1_output
    id: led1
    name: LED 1
  - platform: status_led
    output: led2_output
    id: led2
    name: Status LED

stepper:
  - platform: tmc2209
    id: motor
    max_speed: ${max_speed} steps/s
    acceleration: ${acceleration} steps/s^2
    deceleration: ${deceleration} steps/s^2
    rsense: 100 mOhm
    vsense: False
    enn_pin: 21
    diag_pin: 16
    index_pin: 11
    # step_pin: 5
    # dir_pin: 6
    on_stall:
      - logger.log: "Motor stalled!"
      - if:
          condition:
            lambda: return ${stall_stops_motor};
          then:
            - stepper.stop: motor
      - lambda: |-
          if (${stall_resets_home}) {
            id(sensored_home_pos) = id(encoder)->get_state();
          }
      - if:
          condition:
            lambda: return ${stall_resets_home};
          then:
            - cover.template.publish:
                id: pd_blinds
                state: OPEN
      - light.turn_on:
          id: led1
          transition_length: 0s
      - delay: 250ms
      - light.turn_off:
          id: led1
          transition_length: 1s

button:
  - platform: restart
    name: Restart

  - platform: template
    name: Home
    id: home
    on_press:
      - stepper.set_target:
          id: motor
          target: !lambda |-
            return -1.2 * ${blinds_length};

  - platform: template
    name: Stop
    on_press:
      - stepper.stop: motor

binary_sensor:
 - platform: gpio
   name: Power Good
   pin:
     number: 15
     mode: INPUT
     inverted: true
   device_class: power
   filters:
     - delayed_on: 10ms

 - platform: gpio
   name: Button 1
   pin:
     number: 35
     mode: INPUT
     inverted: true
   id: btn1
   filters:
     - delayed_on: 10ms
   on_press:
     - cover.open: pd_blinds

 - platform: gpio
   name: Button 2
   id: btn2
   pin:
     number: 36
     mode: INPUT
     inverted: true
   filters:
     - delayed_on: 10ms
   on_press:
     - stepper.stop: motor

 - platform: gpio
   name: Button 3
   id: btn3
   pin:
     number: 37
     mode: INPUT
     inverted: true
   filters:
     - delayed_on: 10ms
   on_press:
     - cover.close: pd_blinds

as5600:
  slow_filter: 16x

sensor:
  - platform: as5600
    id: encoder_status
    update_interval: 60s
    status:
      name: Encoder status

  - platform: as5600
    name: Encoder
    id: encoder
    update_interval: 0s # beware of the polling rate
    internal: true # don't publish sensor data to Home Assistant or web server
    filters:
      - delta: 2 # throttle the high polling rate to only act on value changes
      # compute absolute position from angle value

      ########  NORMAL DIRECTION ########
      - lambda: |
          const uint16_t curr = x;
          const uint16_t prev = id(encoder_tracking_)[0];
          if (curr > 3000 && prev < 1000) {
            id(encoder_tracking_)[1] -= (4095 - curr + prev);
          } else if (curr < 1000 && prev > 3000) {
            id(encoder_tracking_)[1] += (4095 - prev + curr);
          } else {
            id(encoder_tracking_)[1] += (curr - prev);
          }
          id(encoder_tracking_)[0] = curr;
          int32_t result = id(encoder_tracking_)[1];
          if (${encoder_invert}) result = result * -1;
          return result;

      - throttle: 250ms # limit the amount of new sensor states from this component
    accuracy_decimals: 0
    state_class: measurement

  - platform: adc
    pin: 4
    name: VBUS Voltage
    update_interval: 10s
    attenuation: 12dB
    filters:
      - multiply: 8.47742

cover:
  - platform: template
    id: pd_blinds
    name: PD Stepper Blinds
    has_position: true
    assumed_state: false
    # internal: true
    lambda: |-
      float pos = 1 - (id(encoder)->get_state() - id(sensored_home_pos)) / ${blinds_length};
      return pos;
    stop_action:
      - stepper.stop: motor
    # 0.195 below is a fixed hardware constant: microsteps x steps/rev / encoder counts = 4 x 200 / 4096
    open_action:
      - stepper.report_position:
          id: motor
          position: !lambda return (1.0-id(pd_blinds)->position) * ${blinds_length} * 0.195;
      - stepper.set_target:
          id: motor
          target: 0
    close_action:
      - stepper.report_position:
          id: motor
          position: !lambda return (1.0-id(pd_blinds)->position) * ${blinds_length} * 0.195;
      - stepper.set_target:
          id: motor
          target: !lambda return ${blinds_length} * 0.195 * 1.01;
    position_action:
      - stepper.report_position:
          id: motor
          position: !lambda return (1.0-id(pd_blinds)->position) * ${blinds_length} * 0.195;
      - stepper.set_target:
          id: motor
          target: !lambda return (1.0-pos) * ${blinds_length} * 0.195;